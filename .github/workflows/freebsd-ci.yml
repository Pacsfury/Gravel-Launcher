name: FreeBSD CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run compilation in FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        sync: rsync
        run: |
          clang src/*.c -o my_program
          ./my_program
